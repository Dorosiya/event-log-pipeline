apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  SPRING_DATASOURCE_URL: {{ .Values.config.springDatasourceUrl | quote }}
  OUTPUT_DIRECTORY: {{ .Values.config.outputDirectory | quote }}
  SIMULATION_ENABLED: {{ .Values.config.simulationEnabled | quote }}
  SIMULATION_INTERVAL_SECONDS: {{ .Values.config.simulationIntervalSeconds | quote }}
  SIMULATION_BATCH_SIZE: {{ .Values.config.simulationBatchSize | quote }}
  SIMULATION_MAX_RUNS: {{ .Values.config.simulationMaxRuns | quote }}
  SIMULATION_SEED: {{ .Values.config.simulationSeed | quote }}
